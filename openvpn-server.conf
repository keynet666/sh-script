port 1194
proto tcp
dev tun
ca ca.crt
cert server.crt
key server.key
dh dh.pem
auth SHA512
tls-crypt tc.key
topology subnet
server 10.8.0.0 255.255.255.0
#push "redirect-gateway def1 bypass-dhcp"
#push "route 192.168.130.0 255.255.255.0 net_gateway"
#push "route 192.168.128.0 255.255.255.0 net_gateway"
push "route 172.30.170.0 255.255.255.0"
ifconfig-pool-persist ipp.txt
#push "dhcp-option DNS 100.100.2.136"
#push "dhcp-option DNS 100.100.2.138"
#push "block-outside-dns"
#push "route ~"
keepalive 10 120
cipher AES-256-CBC
user nobody
group nobody
persist-key
persist-tun
verb 3
crl-verify crl.pem
